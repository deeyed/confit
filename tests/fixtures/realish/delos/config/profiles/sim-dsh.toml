[profile]
name = "sim-dsh"
schema_version = 1
base = "debug"
target = "sim-dsh"

[values]
"delos.debug.dsh" = true
"delos.sim.hosted_stdio" = true
"delos.target.kind" = "sim:dsh"
"delos.target.board" = "host-sim"
"delos.target.cpu" = "host"
"delos.target.output_name" = "delos-sim"
"delos.target.artifact_entry" = "build/target/delos-sim"
"delos.generated.config_root" = "build/generated/config/delos/sim-dsh"
"delos.scheduler.task_slots" = 1
"delos.trace.capacity" = 4
