[option."delos.target.kind"]
type = "enum"
default = "sim:dsh"
choices = ["sim:dsh", "qemu:mps2-an500", "renode:nucleo-h753zi", "renode:stm32f4-discovery", "renode:stm32f7-discovery"]
prompt = "Target kind"
category = "target"
tags = ["target"]
help = "User-facing Delos target surface."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.target.arch"]
type = "enum"
default = "host"
choices = ["host", "armv7m"]
prompt = "Target architecture"
category = "target"
tags = ["target", "arch"]
help = "Architecture lane selected by the target."
owner = "delos-arch"
since = "0.1.0"
stability = "stable"

[option."delos.target.board"]
type = "enum"
default = "host-sim"
choices = ["host-sim", "qemu-mps2-an500", "nucleo-h753zi", "stm32f4-discovery", "stm32f7-discovery"]
prompt = "Target board"
category = "target"
tags = ["target", "board"]
help = "Board or simulator fixture selected by the target."
owner = "delos-board"
since = "0.1.0"
stability = "stable"

[option."delos.target.cpu"]
type = "enum"
default = "host"
choices = ["host", "cortex-m3", "cortex-m4", "cortex-m7"]
prompt = "Target CPU"
category = "target"
tags = ["target", "cpu"]
help = "CPU profile selected by the target."
owner = "delos-arch"
since = "0.1.0"
stability = "stable"

[option."delos.target.output_name"]
type = "string"
default = "delos"
prompt = "Output name"
category = "target"
tags = ["target", "artifact"]
help = "Primary target artifact name."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.target.artifact_entry"]
type = "path"
default = "build/target/delos"
prompt = "Convenience artifact entry"
category = "target"
tags = ["target", "artifact"]
help = "Convenience path for the primary user-facing artifact."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.target.claim_level"]
type = "enum"
default = "host-simulator"
choices = ["host-simulator", "qemu-smoke", "qemu-system", "renode-probe"]
prompt = "Target claim level"
category = "target"
tags = ["target", "claim"]
help = "Claim level exported to build selection manifests."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.toolchain.id"]
type = "enum"
default = "host"
choices = ["host", "arm-none-eabi"]
prompt = "Toolchain"
category = "target/toolchain"
tags = ["target", "toolchain"]
help = "Build toolchain selected by the target."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.board.family"]
type = "enum"
default = "host"
choices = ["host", "arm-mps2", "stm32h7"]
prompt = "Board family"
category = "target/board"
tags = ["target", "board"]
help = "Board family selected by the target."
owner = "delos-board"
since = "0.1.0"
stability = "stable"

[option."delos.board.objects"]
type = "string"
default = "//src/board/host/sim:board_objects"
prompt = "Board object labels"
category = "target/board"
tags = ["target", "board", "qstar"]
help = "Semicolon-separated QStar object labels selected by the board."
owner = "delos-board"
since = "0.1.0"
stability = "stable"

[option."delos.board.include_dirs"]
type = "path"
default = "src/board/host/sim"
prompt = "Board include directories"
category = "target/board"
tags = ["target", "board", "include"]
help = "Semicolon-separated include directories selected by the board."
owner = "delos-board"
since = "0.1.0"
stability = "stable"

[option."delos.board.linker_script"]
type = "path"
default = "linker/host-sim.ld"
prompt = "Board linker script"
category = "target/board"
tags = ["target", "board", "linker"]
help = "Linker script selected by the board."
owner = "delos-board"
since = "0.1.0"
stability = "stable"
