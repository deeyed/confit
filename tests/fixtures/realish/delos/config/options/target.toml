[option."delos.target.kind"]
type = "enum"
default = "sim:dsh"
choices = ["sim:dsh", "qemu:mps2-an500", "renode:nucleo-h753zi", "renode:stm32f4-discovery", "renode:stm32f7-discovery"]
prompt = "Target kind"
category = "target"
tags = ["target"]
help = "User-facing Delos target surface."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.target.arch"]
type = "enum"
default = "host"
choices = ["host", "armv7m"]
prompt = "Target architecture"
category = "target"
tags = ["target", "arch"]
help = "Architecture lane selected by the target."
owner = "delos-arch"
since = "0.1.0"
stability = "stable"

[option."delos.target.board"]
type = "enum"
default = "host-sim"
choices = ["host-sim", "qemu-mps2-an500", "nucleo-h753zi", "stm32f4-discovery", "stm32f7-discovery"]
prompt = "Target board"
category = "target"
tags = ["target", "board"]
help = "Board or simulator fixture selected by the target."
owner = "delos-board"
since = "0.1.0"
stability = "stable"

[option."delos.target.cpu"]
type = "enum"
default = "host"
choices = ["host", "cortex-m3", "cortex-m4", "cortex-m7"]
prompt = "Target CPU"
category = "target"
tags = ["target", "cpu"]
help = "CPU profile selected by the target."
owner = "delos-arch"
since = "0.1.0"
stability = "stable"

[option."delos.target.output_name"]
type = "string"
default = "delos"
prompt = "Output name"
category = "target"
tags = ["target", "artifact"]
help = "Primary target artifact name."
owner = "delos-build"
since = "0.1.0"
stability = "stable"

[option."delos.target.artifact_entry"]
type = "path"
default = "build/target/delos"
prompt = "Convenience artifact entry"
category = "target"
tags = ["target", "artifact"]
help = "Convenience path for the primary user-facing artifact."
owner = "delos-build"
since = "0.1.0"
stability = "stable"
