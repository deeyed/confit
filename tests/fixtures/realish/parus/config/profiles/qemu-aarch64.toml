[profile]
name = "qemu-aarch64"
schema_version = 1
base = "bringup"
target = "qemu-virt-aarch64"

[values]
"parus.config.profile" = "qemu-virt-aarch64"
"parus.config.defconfig" = "configs/boards/qemu-virt-aarch64/defconfig"
"parus.config.output_dir" = "build/work/cmake/qemu-aarch64/config"
