name: Confit CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-latest
            os: ubuntu-latest
          - name: macos-latest
            os: macos-latest
          - name: windows-clang-cli
            os: windows-latest

    steps:
      - name: Configure Windows checkout line endings
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libncurses-dev

      - name: Set up Windows clang toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja

      - name: Configure, build, and test
        if: runner.os != 'Windows'
        run: ./tests/run_tests.sh

      - name: Configure, build, and test Windows CLI
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -S . -B build-windows-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCONFIT_ENABLE_TUI=ON
          grep -Fx "CONFIT_ENABLE_TUI:BOOL=OFF" build-windows-ci/CMakeCache.txt
          cmake --build build-windows-ci
          ctest --test-dir build-windows-ci --output-on-failure

      - name: Windows CLI artifact smoke
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -eu
          CONFIT_BIN=build-windows-ci/confit.exe
          PROJECT_DIR=tests/fixtures/realish/delos
          OUT_DIR=build-windows-ci/artifact-smoke/delos-sim-dsh

          "$CONFIT_BIN" doctor > build-windows-ci/doctor.txt
          grep -F "platform lane: windows-cli-only" build-windows-ci/doctor.txt
          grep -F "tui: unsupported" build-windows-ci/doctor.txt
          grep -F "install rule: single executable artifact: <prefix>/bin/confit.exe" \
            build-windows-ci/doctor.txt

          "$CONFIT_BIN" check --project "$PROJECT_DIR" --profile sim-dsh
          "$CONFIT_BIN" gen --project "$PROJECT_DIR" --profile sim-dsh \
            --out "$OUT_DIR" --artifact all

          test -s "$OUT_DIR/config.h"
          test -s "$OUT_DIR/config.cmake"
          test -s "$OUT_DIR/config/config.qsm"
          test -s "$OUT_DIR/config.qst"
          test -s "$OUT_DIR/delos_build_selection/delos_build_selection.qsm"
          test -s "$OUT_DIR/config.report.json"
          test -s "$OUT_DIR/config.explain.txt"
          test -s "$OUT_DIR/config.graph.json"
          test -s "$OUT_DIR/config.inputs.json"
          grep -F "confit-config-manifest-v1" "$OUT_DIR/config/config.qsm"
          grep -F "delos-build-selection-v1" \
            "$OUT_DIR/delos_build_selection/delos_build_selection.qsm"

          set +e
          "$CONFIT_BIN" tui --project "$PROJECT_DIR" --profile sim-dsh \
            > build-windows-ci/tui.out 2> build-windows-ci/tui.err
          TUI_STATUS=$?
          set -e
          test "$TUI_STATUS" -eq 8
          grep -F "unsupported command or platform" build-windows-ci/tui.err
          grep -F "confit tui is unsupported" build-windows-ci/tui.err

      - name: Install smoke
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B "${RUNNER_TEMP}/confit-install-build" -DCMAKE_BUILD_TYPE=Release
          cmake --build "${RUNNER_TEMP}/confit-install-build" --target confit
          cmake --install "${RUNNER_TEMP}/confit-install-build" --prefix "${RUNNER_TEMP}/confit-prefix"
          "${RUNNER_TEMP}/confit-prefix/bin/confit" doctor

      - name: Install smoke Windows CLI
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake --install build-windows-ci --prefix install-windows-ci
          test -s install-windows-ci/bin/confit.exe
          install-windows-ci/bin/confit.exe doctor
